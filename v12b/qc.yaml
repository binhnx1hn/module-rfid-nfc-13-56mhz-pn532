# ═══════════════════════════════════════════
# TESTING STRATEGY (QC-specific)
# ═══════════════════════════════════════════
testingStrategy:
  perRole:
    qc:
      tier1:
        method: "Code review + build verification + terminal API testing"
        steps:
          - "npm run build MUST pass (FE-17)"
          - "Read JSX/TSX source code to verify component logic"
          - "curl API endpoints to verify response contracts"
          - "Trust Vision Parser screenshots for visual verification"
      tier2:
        method: "Code review + Chrome DevTools MCP deep inspection"
        steps:
          - "npm run build MUST pass (FE-17)"
          - "Read source code for logic review (same as Tier 1)"
          - "Use list_console_messages to catch ALL console errors and warnings"
          - "Use list_network_requests to verify API calls match contract"
          - "Use lighthouse_audit for performance, accessibility, SEO scores"
          - "Use evaluate_script to verify runtime state (e.g. check store values)"
          - "Use take_snapshot to verify DOM matches expected structure"
      delegation: "Visual layout issues are Vision Parser responsibility. QC trusts Vision output."
  buildAsGate: true
  buildCommand: "cd dashboard/frontend && npm run build"
  buildMustPass: "FE-17 BUILD-MUST-PASS is the PRIMARY frontend quality gate regardless of tier"

# ═══════════════════════════════════════════
# CODEBASE KNOWLEDGE (QC-relevant)
# ═══════════════════════════════════════════
codebaseKnowledge:
  namingRules:
    tablePrefix:
      backtest: "backtest_alerts, backtest_trades (Module I historical 2010-2025)"
      indicator: "indicator_alerts, indicator_trades (Module II live 24/7)"
      pgAlias: "PG table 'alerts' = indicator_alerts (abstraction layer handles mapping)"
    confidence:
      storage: "0.0-1.0 (decimal) in DB"
      display: "0-100 (percentage) in FE"
      conversion: "Route handler multiplies by 100 before sending to FE"
    symbols:
      canonical: BTC
      yahoo: BTC-USD
      binance: BTCUSDT
    assetClasses: "[ETF, CRYPTO, COMMODITY, FOREX, INDEX] always UPPERCASE"
    regimes: "[BULL, BEAR] only two values"
  importConvention:
    rule: "Always absolute from tradingbot package"
    example: "from tradingbot.db.indicator_db import IndicatorDatabase"
    never: "Never relative imports (from ..db import X)"
  keyConstants:
    RESET_INDICATOR_ON_BOOT: "MUST be false in production"
  deployment:
    ports: "API=9192, FE=80(nginx), Backtest=8194"
