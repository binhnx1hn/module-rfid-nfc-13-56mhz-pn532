# ============================================
# QC - Quality Control Knowledge Base
# ============================================
# File riêng cho QC. Chứa toàn bộ nội dung v12a mà QC cần.
# QC cần ALL standards — đây là file lớn nhất vì QC audit tất cả.

# ═══════════════════════════════════════════
# SHARED PRINCIPLES & SAFETY
# ═══════════════════════════════════════════
oneShotProtocol:
  principles:
    - 'Read before write: every agent reads codemap.md + project.md + audit.md before ANY code change'
    - 'Contract-first: BA writes contract, BE writes API-CONTRACT, FE reads API-CONTRACT'
    - 'Fail fast: Integration catches mismatches before QC spends time reviewing'
    - 'Minimal diff: only change what BA spec requires, nothing more'
    - 'Signal-driven: agents communicate via signals, not assumptions'
  qualityGates:
    - gate: integration
      purpose: "Verify it WORKS (builds, starts, responds)"
    - gate: vision-parser
      purpose: "Verify it LOOKS RIGHT (layout, responsive, states)"
    - gate: qc
      purpose: "Verify it is CORRECT and CLEAN (specs, standards, security)"
    - gate: reviewer
      purpose: "Verify it is WISE (architecture, production readiness, tech debt)"

safety:
  preventRoleOverride: true
  forbidContractMutation: true
  forbidSpecMutation: true

