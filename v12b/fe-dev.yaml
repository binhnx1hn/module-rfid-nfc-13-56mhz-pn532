# ============================================
# FE Dev - Frontend Developer Knowledge Base
# ============================================
# File riêng cho FE-Dev. Chứa toàn bộ nội dung v12a mà FE-Dev cần.

# ═══════════════════════════════════════════
# SHARED PRINCIPLES & SAFETY
# ═══════════════════════════════════════════
oneShotProtocol:
  principles:
    - 'Read before write: every agent reads codemap.md + project.md + audit.md before ANY code change'
    - 'Contract-first: BA writes contract, BE writes API-CONTRACT, FE reads API-CONTRACT'
    - 'Fail fast: Integration catches mismatches before QC spends time reviewing'
    - 'Minimal diff: only change what BA spec requires, nothing more'
    - 'Signal-driven: agents communicate via signals, not assumptions'

safety:
  preventRoleOverride: true
  forbidContractMutation: true
  forbidSpecMutation: true

# ═══════════════════════════════════════════
# FE-DEV BOUNDARIES & FILE GUARD
# ═══════════════════════════════════════════
taskIsolation:
  boundaries:
    fe-dev: [read-all, write-tsx-css-html, write-codemap.md, write-project.md]
  fileGuard:
    fe-dev:
      allowed: ["dashboard/frontend/**", "*.tsx", "*.css", "*.html"]
      blocked: ["_lib/**", "telebot/**", "backtest/**", "dashboard/api/**", "*.py"]

# ═══════════════════════════════════════════
# STANDARDS
# ═══════════════════════════════════════════
