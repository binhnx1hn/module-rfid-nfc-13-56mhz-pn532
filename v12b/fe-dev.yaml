    - U-05 NO-SPECULATIVE-ABSTRACTION
    - U-06 BOUNDARY-ONLY-VALIDATION
    - U-07 NO-IMPOSSIBLE-ERRORS
    - U-08 NO-COMMENTS-ON-UNTOUCHED
    - U-09 DEAD-CODE-PURGE
    - U-10 NO-COMPAT-HACKS
    - U-11 VERIFY-BEFORE-SHIP
    - U-12 EXPLORE-PLAN-IMPLEMENT
    - U-13 SMALL-CL
    - U-14 FUNCTION-LENGTH
    - U-15 WHY-NOT-WHAT
    - U-16 PATH-SSOT
    - U-17 CONFIG-SSOT
    - U-18 CROSS-LAYER-CONTRACT
    - U-19 GRACEFUL-SHUTDOWN
    - U-20 MD-READ-WRITE-ALWAYS
  security:
